# ============================================================
# Deploy automático do Frontend React → GitHub Pages
# Disparado ao fazer push na branch main
# ============================================================
name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:   # permite rodar manualmente

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build de produção
        working-directory: frontend
        env:
          # URL do backend Railway – configure em Settings → Secrets → VITE_API_URL
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # Se o repositório não estiver na raiz (ex: github.io/bom-system), coloque /bom-system/
          VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
